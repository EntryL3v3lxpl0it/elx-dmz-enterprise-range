---
- name: Create DMZ directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ elx_dmz_dirs }}"
  become: true

# Proxy env is configured ONLY during provisioning, and removed otherwise.
- name: Configure apt proxy (provisioning egress on)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/01elx-proxy
    mode: "0644"
    content: |
      Acquire::http::Proxy "http://{{ gateway_private_ip }}:{{ package_proxy_port }}";
  become: true
  when:
    - enable_provisioning_egress | bool
    - gateway_private_ip | length > 0

- name: Remove apt proxy (provisioning egress off)
  ansible.builtin.file:
    path: /etc/apt/apt.conf.d/01elx-proxy
    state: absent
  become: true
  when: not (enable_provisioning_egress | bool)

# Intentionally NO vulnerable applications are deployed in Phase 1b.
