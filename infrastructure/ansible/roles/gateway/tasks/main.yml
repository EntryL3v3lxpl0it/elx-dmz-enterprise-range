---
- name: Install network troubleshooting tools
  ansible.builtin.apt:
    name: "{{ gateway_net_tools }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Prepare gateway directories (wireguard / reverse-proxy / logs)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
  loop: "{{ gateway_dirs }}"
  become: true

# IP forwarding is enabled ONLY when explicitly requested. This is the only
# thing automated for break-glass NAT; a working NAT path also requires manual
# iptables MASQUERADE and a private default route, which are intentionally NOT
# automated (see docs). gateway_enable_breakglass_nat implies forwarding on.
- name: Manage IP forwarding sysctl drop-in
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-elx-gateway.conf
    mode: "0644"
    content: "net.ipv4.ip_forward = {{ 1 if (gateway_enable_ip_forwarding | bool or gateway_enable_breakglass_nat | bool) else 0 }}\n"
  become: true
  notify: Reload sysctl

- name: Apply IP forwarding setting immediately
  ansible.builtin.command: >-
    sysctl -w net.ipv4.ip_forward={{ 1 if (gateway_enable_ip_forwarding | bool or gateway_enable_breakglass_nat | bool) else 0 }}
  changed_when: false
  become: true
