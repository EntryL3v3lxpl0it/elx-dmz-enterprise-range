---
- name: Install Docker from Ubuntu OS repository
  become: true
  block:
    - name: Install apt repository helpers
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Enable Ubuntu universe repository
      ansible.builtin.apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_distribution_release }} universe"
        state: present
        filename: ubuntu-universe
        update_cache: true
      when: not ansible_check_mode

    - name: Explain Docker install check-mode behavior
      ansible.builtin.debug:
        msg: "Skipping Docker package installation in check mode because universe repo changes are not applied during dry run."
      when: ansible_check_mode

    - name: Install Docker packages from Ubuntu repository
      ansible.builtin.apt:
        name:
          - docker.io
          - python3-docker
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: not ansible_check_mode

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      when: not ansible_check_mode

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true
      when: not ansible_check_mode
