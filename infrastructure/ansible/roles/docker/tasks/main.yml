---
- name: Docker setup
  when: elx_install_docker | bool
  become: true
  block:
    - name: Install Docker packages (OS repo)
      ansible.builtin.apt:
        name: "{{ elx_docker_packages }}"
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ elx_docker_user }}"
        groups: docker
        append: true
      when: elx_add_user_to_docker_group | bool

    - name: Verify Docker is running
      ansible.builtin.command: docker info
      changed_when: false
