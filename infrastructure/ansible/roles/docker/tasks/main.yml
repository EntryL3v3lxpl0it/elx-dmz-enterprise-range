---
- name: Install Docker engine from distro repository
  ansible.builtin.apt:
    name:
      - docker.io
    state: present
    update_cache: true
  become: true

- name: Install Docker Compose support
  block:
    - name: Install Docker Compose v2 plugin
      ansible.builtin.apt:
        name:
          - docker-compose-plugin
        state: present
      become: true

  rescue:
    - name: Install docker-compose fallback package
      ansible.builtin.apt:
        name:
          - docker-compose
        state: present
      become: true

- name: Enable Docker service
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  become: true

- name: Add Ansible user to docker group
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups: docker
    append: true
  become: true
  when: ansible_facts['user_id'] is defined

- name: Check Docker version
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: Check Docker Compose v2 command
  ansible.builtin.command: docker compose version
  register: docker_compose_v2
  changed_when: false
  failed_when: false

- name: Check docker-compose fallback command
  ansible.builtin.command: docker-compose --version
  register: docker_compose_fallback
  changed_when: false
  failed_when: false
  when: docker_compose_v2.rc != 0

- name: Fail if no Docker Compose command is available
  ansible.builtin.fail:
    msg: "Docker installed, but neither 'docker compose' nor 'docker-compose' is available."
  when:
    - docker_compose_v2.rc != 0
    - docker_compose_fallback is not defined or docker_compose_fallback.rc != 0

- name: Display Docker version
  ansible.builtin.debug:
    var: docker_version.stdout

- name: Display Docker Compose v2 version if available
  ansible.builtin.debug:
    var: docker_compose_v2.stdout
  when: docker_compose_v2.rc == 0

- name: Display docker-compose fallback version if used
  ansible.builtin.debug:
    var: docker_compose_fallback.stdout
  when:
    - docker_compose_v2.rc != 0
    - docker_compose_fallback is defined
    - docker_compose_fallback.rc == 0
