---
# Applies to every host. No secrets here.
elx_environment: team1
elx_base_dir: /opt/elx
elx_log_dir: /var/log/elx
elx_timezone: Etc/UTC
elx_marker_path: /etc/elx-range

# Baseline packages installed on all Linux hosts
elx_common_packages:
  - curl
  - wget
  - jq
  - unzip
  - git
  - net-tools
  - ca-certificates

# Docker is OFF by default; enabled per group (dmz, internal)
elx_install_docker: false
elx_docker_user: ubuntu

# Provisioning egress (package proxy). Keep FALSE except during provisioning.
# Must match the Terraform variable enable_provisioning_egress.
enable_provisioning_egress: false

# Gateway private IP (10.50.10.x). Required only for dmz/internal apt proxy when
# enable_provisioning_egress is true. Set from Terraform output gateway_private_ip.
gateway_private_ip: ""
package_proxy_port: 3142
